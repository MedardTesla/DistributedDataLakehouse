connector.name=iceberg

# ── Nessie REST Catalog ────────────────────────────────────────────────────
# Nessie expose l'API Iceberg REST sur /iceberg/v1
# Le warehouse doit correspondre exactement à ce que Nessie annonce dans /iceberg/v1/config
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://nessie:19120/iceberg
iceberg.rest-catalog.warehouse=lakehouse
iceberg.rest-catalog.security=NONE

# ── MinIO S3 ───────────────────────────────────────────────────────────────
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.aws-access-key=admin
s3.aws-secret-key=password123
s3.path-style-access=true