# ═══════════════════════════════════════════════════════════════
#  Data Lakehouse Stack — E-commerce
#  Compatible Windows (WSL2) + Linux + macOS
# ═══════════════════════════════════════════════════════════════

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstA="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW_CONN_MINIO_S3: '{"conn_type":"aws","extra":{"endpoint_url":"http://minio:9000","aws_access_key_id":"admin","aws_secret_access_key":"password123"}}'
    AIRFLOW_CONN_TRINO_DEFAULT: '{"conn_type":"trino","host":"trino","port":8080,"schema":"bronze"}'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./dbt:/opt/dbt
  depends_on:
    postgres:
      condition: service_healthy

networks:
  lakehouse:
    driver: bridge

volumes:
  minio-data:
  postgres-data:
  nessie-data:

services:

  # ─────────────────────────────────────────────────────────────
  # MINIO
  # ─────────────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    networks: [lakehouse]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: minio-init
    networks: [lakehouse]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 admin password123;
        mc mb --ignore-existing local/lakehouse-bronze;
        mc mb --ignore-existing local/lakehouse-silver;
        mc mb --ignore-existing local/lakehouse-gold;
        mc mb --ignore-existing local/nessie-warehouse;
        echo 'Buckets crees';
      "

  # ─────────────────────────────────────────────────────────────
  # NESSIE
  # ─────────────────────────────────────────────────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: nessie
    networks: [lakehouse]
    ports:
      - "19120:19120"
    environment:
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
      QUARKUS_HTTP_PORT: 19120
    volumes:
      - nessie-data:/nessie/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # TRINO — FIX définitif Windows/WSL2
  #
  # PRINCIPE : l'image trinodb/trino embarque une config par défaut
  # single-node complète. On ne monte QUE le dossier catalog/
  # (dossier → dossier = pas de problème Windows).
  # Aucun entrypoint override, aucun bind-mount de fichier individuel.
  # ─────────────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:438
    container_name: trino
    networks: [lakehouse]
    ports:
      - "8080:8080"
    volumes:
      # Seul un DOSSIER est monté — fonctionne partout y compris Windows
      - ./trino/catalog:/etc/trino/catalog
    depends_on:
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 12

  # ─────────────────────────────────────────────────────────────
  # POSTGRESQL
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    networks: [lakehouse]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # AIRFLOW
  # ─────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    networks: [lakehouse]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@lakehouse.local &&
        echo 'Airflow initialise'

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    networks: [lakehouse]
    ports:
      - "8081:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    networks: [lakehouse]
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────────────────────────
  # DBT
  # ─────────────────────────────────────────────────────────────
  dbt:
    build: ./dbt          # construit depuis dbt/Dockerfile via pip install
    container_name: dbt
    networks: [lakehouse]
    volumes:
      - ./dbt:/usr/app/dbt
    working_dir: /usr/app/dbt
    depends_on:
      trino:
        condition: service_healthy